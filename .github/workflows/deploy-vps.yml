name: Deploy API_elec to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: 🔨 Build Docker image (api-elec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API_elec
        uses: actions/checkout@v4.2.2

      # Récupère uniquement docker-compose.prod.yml depuis le repo ElecCompare
      # (nécessaire pour que le VPS puisse démarrer le service api-elec)
      # Si le dépôt est privé, décommenter token: et ajouter le secret GH_PAT
      - name: Checkout ElecCompare (docker-compose uniquement)
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.repository_owner }}/ElecCompare
          # token: ${{ secrets.GH_PAT }}
          path: eleccompare-src
          sparse-checkout: |
            /docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Build Docker image
        run: docker build -t api-elec:${{ github.sha }} -t api-elec:latest .

      - name: Save Docker image as archive
        run: docker save api-elec:latest | gzip > api-elec.tar.gz

      - name: Préparer le docker-compose pour l'upload
        run: cp eleccompare-src/docker-compose.prod.yml docker-compose.prod.yml

      - name: Prepare target directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            mkdir -p $HOME/eleccompare

      - name: Upload image to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          source:   "api-elec.tar.gz,docker-compose.prod.yml"
          target:   "~/eleccompare"
          timeout:  120s

  deploy:
    name: 🚀 Deploy api-elec on VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e
            cd $HOME/eleccompare

            echo "📦 Loading api-elec Docker image..."
            docker load < $HOME/eleccompare/api-elec.tar.gz

            echo "🔄 Restarting api-elec service only..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps api-elec

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ api-elec deployment complete!"

