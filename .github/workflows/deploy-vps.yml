name: Deploy API_elec to VPS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API_elec
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  build-and-push:
    name: 🔨Build Docker image (api-elec)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout API_elec
        uses: actions/checkout@v6.0.2

      - name: Build Docker image
        run: docker build -t api-elec:${{ github.sha }} -t api-elec:latest .

      - name: Save Docker image as archive
        run: docker save api-elec:latest | gzip > api-elec.tar.gz

      - name: Prepare target directory on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            mkdir -p $HOME/api-elec
            docker network inspect eleccompare-net >/dev/null 2>&1 || docker network create eleccompare-net

      - name: Upload image and compose to VPS via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          source:   "api-elec.tar.gz,docker-compose.prod.yml"
          target:   "~/api-elec"
          timeout:  120s

  deploy:
    name: Deploy api-elec on VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e
            cd $HOME/api-elec
            echo "📦 Loading api-elec Docker image..."
            docker load < api-elec.tar.gz
            echo "🔄 Restarting api-elec service..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "🧹Cleaning up old images..."
            docker image prune -f
            echo "✅ api-elec deployment complete!"
